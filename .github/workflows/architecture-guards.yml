name: Architecture Guards

on:
  # PR の更新タイミングで継続的にガードを実行する。
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # 直接 push 時にも検査可能にする。
  push:
  # メンテナが任意タイミングで実行できる。
  workflow_dispatch:
  # PR コメントで `/guard` を打ったときの手動実行トリガー。
  issue_comment:
    types: [created]

permissions:
  # デフォルトは最小権限。
  contents: read

jobs:
  architecture-guards:
    # 実行トリガーを明示し、コメント実行時は権限チェックも行う。
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/guard') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    permissions:
      contents: read
      pull-requests: read
    outputs:
      exit_code: ${{ steps.guard.outputs.exit_code }}
      target_sha: ${{ steps.target.outputs.sha }}
      is_nextjs: ${{ steps.detect-next.outputs.is_nextjs }}
      package_dir: ${{ steps.detect-next.outputs.package_dir }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve Target SHA
        id: target
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            // `/guard` 実行時は PR の head SHA を明示的に取得する。
            if (context.eventName === "issue_comment") {
              const prNumber = context.issue.number;
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              core.setOutput("sha", pr.head.sha);
              return;
            }

            // PR 以外はイベント由来の SHA を使う。
            const pullRequestSha = context.payload.pull_request?.head?.sha;
            core.setOutput("sha", pullRequestSha || context.sha);

      - name: Checkout Trusted Default Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: trusted

      - name: Checkout Target Commit
        # 実際に検査したいコミットを別パスに checkout する。
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.sha }}
          path: target

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Detect Next.js Project
        id: detect-next
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const repoRoot = path.join(process.cwd(), 'target');
            const ignoreDirNames = new Set([
              '.git',
              'node_modules',
              '.next',
              'dist',
              'build',
              'coverage',
              '.turbo',
              '.vercel',
            ]);
            const toPosix = (p) => p.split(path.sep).join('/');

            const isDirectory = (absPath) => {
              try {
                return fs.existsSync(absPath) && fs.statSync(absPath).isDirectory();
              } catch {
                return false;
              }
            };

            const walkPackageJsonFiles = (startDir) => {
              const out = [];
              const stack = [startDir];
              while (stack.length > 0) {
                const dir = stack.pop();
                let entries;
                try {
                  entries = fs.readdirSync(dir, { withFileTypes: true });
                } catch {
                  continue;
                }

                for (const entry of entries) {
                  const abs = path.join(dir, entry.name);
                  if (entry.isDirectory()) {
                    if (ignoreDirNames.has(entry.name)) continue;
                    stack.push(abs);
                    continue;
                  }
                  if (entry.isFile() && entry.name === 'package.json') {
                    out.push(abs);
                  }
                }
              }
              return out;
            };

            const pickSourceAndAppRoots = (packageDir) => {
              const appDir = path.join(packageDir, 'app');
              if (isDirectory(appDir)) {
                return { sourceRoot: packageDir, appRoot: appDir };
              }

              const srcAppDir = path.join(packageDir, 'src', 'app');
              if (isDirectory(srcAppDir)) {
                return { sourceRoot: path.join(packageDir, 'src'), appRoot: srcAppDir };
              }
              return null;
            };

            const depthFromRoot = (absDir) => {
              const rel = path.relative(repoRoot, absDir);
              if (!rel) return 0;
              return toPosix(rel).split('/').length;
            };

            const candidates = walkPackageJsonFiles(repoRoot)
              .map((packageJsonPath) => {
                const packageDir = path.dirname(packageJsonPath);
                const roots = pickSourceAndAppRoots(packageDir);
                if (!roots) return null;
                return {
                  packageJsonPath,
                  packageDir,
                  sourceRoot: roots.sourceRoot,
                  appRoot: roots.appRoot,
                };
              })
              .filter(Boolean);

            // package.json + app/src/app を満たす対象が無い場合はスキップする。
            if (candidates.length === 0) {
              core.setOutput('is_nextjs', 'false');
              core.setOutput('package_dir', '');
              core.notice('Skip Architecture Guards: package.json + app/src/app を満たす対象が見つかりませんでした。');
              return;
            }

            // `.ci/architecture-guards.mjs` と同じ優先度で実行対象 package を1つ選ぶ。
            candidates.sort((a, b) => {
              const aIsRoot = a.packageDir === repoRoot ? 0 : 1;
              const bIsRoot = b.packageDir === repoRoot ? 0 : 1;
              if (aIsRoot !== bIsRoot) return aIsRoot - bIsRoot;

              const aIsWeb = path.basename(a.packageDir) === 'web' ? 0 : 1;
              const bIsWeb = path.basename(b.packageDir) === 'web' ? 0 : 1;
              if (aIsWeb !== bIsWeb) return aIsWeb - bIsWeb;

              const depthDiff = depthFromRoot(a.packageDir) - depthFromRoot(b.packageDir);
              if (depthDiff !== 0) return depthDiff;
              return a.packageDir.localeCompare(b.packageDir);
            });

            const picked = candidates[0];
            const packageDir = toPosix(path.relative(repoRoot, picked.packageDir) || '.');
            const packageJson = toPosix(path.relative(repoRoot, picked.packageJsonPath));
            const appRoot = toPosix(path.relative(repoRoot, picked.appRoot));

            core.setOutput('is_nextjs', 'true');
            core.setOutput('package_dir', packageDir);
            core.notice(`Architecture Guards target: package=${packageJson}, app=${appRoot}`);

      - name: Install Dependencies For AST Parsing
        # 対象 package の lockfile があるときだけ依存を導入する（無ければ regex fallback）。
        if: steps.detect-next.outputs.is_nextjs == 'true'
        run: |
          set -euo pipefail
          PACKAGE_DIR="${{ steps.detect-next.outputs.package_dir }}"
          if [ -z "$PACKAGE_DIR" ]; then
            echo "Skip dependency installation: package_dir is empty."
            exit 0
          fi

          if [ -f "target/$PACKAGE_DIR/package-lock.json" ]; then
            npm ci --prefix "target/$PACKAGE_DIR" --ignore-scripts
          else
            echo "Skip dependency installation: package-lock.json was not found in target/$PACKAGE_DIR."
          fi

      - name: Run Architecture Guards
        if: steps.detect-next.outputs.is_nextjs == 'true'
        id: guard
        continue-on-error: true
        run: |
          set +e
          # 検査対象は target、実行するスクリプトは trusted を使う（改ざん耐性）。
          (
            cd target
            node ../trusted/.ci/architecture-guards.mjs > ../guard-output.txt 2>&1
          )
          status=$?
          # 判定結果は後続 job で使うため output に保存する。
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Guard Output (/guard only)
        # `/guard` 実行時のみログを artifact 化してコメント job で再利用する。
        if: steps.detect-next.outputs.is_nextjs == 'true' && github.event_name == 'issue_comment'
        uses: actions/upload-artifact@v4
        with:
          name: architecture-guard-output
          path: guard-output.txt
          if-no-files-found: error
          retention-days: 1

      - name: Fail On Guard Violations
        # must 違反がある場合は job を fail させる。
        if: steps.detect-next.outputs.is_nextjs == 'true' && steps.guard.outputs.exit_code != '0'
        run: |
          echo "Architecture Guards failed."
          cat guard-output.txt
          exit 1

  comment-guard-result:
    # `/guard` 実行時のみ PR へ結果コメントを返す。
    if: |
      always() &&
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/guard') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
      needs.architecture-guards.outputs.is_nextjs == 'true'
    needs: [architecture-guards]
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: Download Guard Output
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: architecture-guard-output
          path: .

      - name: Comment Result To PR
        uses: actions/github-script@v7
        env:
          GUARD_EXIT_CODE: ${{ needs.architecture-guards.outputs.exit_code }}
          GUARD_TARGET_SHA: ${{ needs.architecture-guards.outputs.target_sha }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            // 同一 bot コメントを上書きするためのマーカー。
            const marker = '<!-- architecture-guard-report -->';
            const exitCode = process.env.GUARD_EXIT_CODE || '1';
            const targetSha = process.env.GUARD_TARGET_SHA || context.sha;
            const passed = exitCode === '0';

            let output = '';
            try {
              output = fs.readFileSync('guard-output.txt', 'utf8');
            } catch (e) {
              output = `Failed to read guard-output.txt: ${String(e)}`;
            }

            // コメント本文上限を超えないように出力を切り詰める。
            const maxLen = 60000;
            const truncated = output.length > maxLen
              ? `${output.slice(0, maxLen)}\n... (truncated)`
              : output;

            const summary = passed
              ? '✅ Architecture Guards passed'
              : '❌ Architecture Guards failed';

            const body = [
              marker,
              `## ${summary}`,
              'Trigger: `/guard`',
              `Commit: \`${targetSha.slice(0, 7)}\``,
              '',
              '<details>',
              '<summary>Guard Output</summary>',
              '',
              '```text',
              truncated || '(no output)',
              '```',
              '</details>',
            ].join('\n');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const { data: me } = await github.rest.users.getAuthenticated();
            const actorLogin = me.login;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            // 同一マーカーの既存コメントがあれば更新、無ければ新規作成。
            const existing = comments.find(
              (c) => c.user?.login === actorLogin && c.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
