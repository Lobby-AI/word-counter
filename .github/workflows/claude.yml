name: Claude Code

on:
  # Issue / PR コメントで @claude を受け取る。
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  # Issue の新規作成・アサイン・ラベル変更にも反応する。
  issues:
    types: [opened, assigned, labeled]

jobs:
  claude:
    if: |
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      # 1) 対象コードを runner に展開する。
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # ブランチ操作に備えて履歴は浅くせず取得する。
          fetch-depth: 0

      # 2) Claude Code Action を実行する。
      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          # prompt を渡すと comment event で agent mode になるため、
          # track_progress を有効にして tag mode を強制する。
          # これにより @claude コメント本文と PR / Issue 文脈を使ってレビューできる。
          track_progress: true
          # __PROMPT_BLOCK__ は sync-claude-workflow.yml が配布時に共有 prompt へ置換します。
          # この template を単体で実行すると placeholder は残るため、挙動確認は同期後 workflow を基準にします。
          prompt: |
            Follow the shared LobbyAI guidance below. Apply it to every answer, review, and code change in this workflow run.

            ## 基本方針
            
            丁寧で親しみやすい日本語でレビューする。 良い設計や改善意図がある場合はそれを簡潔に認めつつ、 問題点は曖昧にせず、具体的かつ率直に指摘する。 重大な問題（バグ、セキュリティ、壊れる変更、運用事故につながる変更）は、影響と修正方針が分かるよう明確に伝える。 可読性と実務上の有用性を優先する。 アクセシビリティへの対応は3年後に予定されているため、現在は言及しない。
            
            
