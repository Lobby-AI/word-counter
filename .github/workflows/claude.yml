name: Claude Code

on:
  # Issue / PR コメントで @claude を受け取る。
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  # Issue の新規作成・アサイン・ラベル変更にも反応する。
  issues:
    types: [opened, assigned, labeled]

jobs:
  claude:
    if: |
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      # 1) 対象コードを runner に展開する。
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # ブランチ操作に備えて履歴は浅くせず取得する。
          fetch-depth: 0

      # 2) Claude Code Action を実行する。
      - name: Run Claude Code Action
        id: run_claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          # __PROMPT_BLOCK__ は sync-claude-workflow.yml が配布時に共有 prompt へ置換します。
          # この template を単体で実行すると placeholder は残るため、挙動確認は同期後 workflow を基準にします。
          prompt: |
            Follow the shared LobbyAI guidance below. Apply it to every answer, review, and code change in this workflow run.

            ## 基本方針
            
            丁寧で親しみやすい日本語でレビューする。 良い設計や改善意図がある場合はそれを簡潔に認めつつ、 問題点は曖昧にせず、具体的かつ率直に指摘する。 重大な問題（バグ、セキュリティ、壊れる変更、運用事故につながる変更）は、影響と修正方針が分かるよう明確に伝える。 可読性と実務上の有用性を優先する。 アクセシビリティへの対応は3年後に予定されているため、現在は言及しない。
            
            

      - name: Post Claude feedback
        if: always() && steps.run_claude.outputs.execution_file != '' && !cancelled()
        uses: actions/github-script@v7
        env:
          EXECUTION_FILE: ${{ steps.run_claude.outputs.execution_file }}
          RUN_ID: ${{ github.run_id }}
          SESSION_ID: ${{ steps.run_claude.outputs.session_id }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");

            const executionFile = process.env.EXECUTION_FILE;
            if (!executionFile || !fs.existsSync(executionFile)) {
              core.info("Skip posting Claude feedback: execution file was not created.");
              return;
            }

            const raw = fs.readFileSync(executionFile, "utf8");
            const turns = JSON.parse(raw);
            if (!Array.isArray(turns)) {
              core.info("Skip posting Claude feedback: execution file format was unexpected.");
              return;
            }

            const assistantTexts = [];
            for (const turn of turns) {
              if (turn?.type !== "assistant") {
                continue;
              }

              const content = Array.isArray(turn?.message?.content)
                ? turn.message.content
                : [];
              const text = content
                .filter((item) => item?.type === "text" && typeof item.text === "string")
                .map((item) => item.text.trim())
                .filter(Boolean)
                .join("\n\n");

              if (text) {
                assistantTexts.push(text);
              }
            }

            const finalResult = [...turns]
              .reverse()
              .find((turn) => turn?.type === "result" && typeof turn.result === "string" && turn.result.trim());

            let bodyText = assistantTexts.join("\n\n---\n\n").trim();
            if (!bodyText && finalResult?.result) {
              bodyText = finalResult.result.trim();
            }
            if (!bodyText) {
              bodyText = "Claude は正常終了しましたが、可視化できる本文を返しませんでした。Workflow run と session を確認してください。";
            }

            const marker = `<!-- lobbyai-claude-report:${process.env.RUN_ID} -->`;
            let body = `${marker}\n## Claude\n\n${bodyText}`;

            if (process.env.SESSION_ID) {
              body += `\n\n_Session ID: \`${process.env.SESSION_ID}\`_`;
            }

            if (body.length > 65000) {
              body = `${body.slice(0, 64900)}\n\n_(truncated)_`;
            }

            const issueNumber =
              context.payload.issue?.number ?? context.payload.pull_request?.number;
            if (!issueNumber) {
              core.info("Skip posting Claude feedback: issue or pull request number was not available.");
              return;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const existingComment = comments.find(
              (comment) =>
                comment.user?.login === "github-actions[bot]" &&
                typeof comment.body === "string" &&
                comment.body.includes(marker),
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
