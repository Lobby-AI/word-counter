name: Claude Code

on:
  # Issue / PR コメントで @claude を受け取る。
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  # Issue の新規作成・アサイン・ラベル変更にも反応する。
  issues:
    types: [opened, assigned, labeled]

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
      issues: write
    steps:
      # 1) 対象コードを runner に展開する。
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # ブランチ操作に備えて履歴は浅くせず取得する。
          fetch-depth: 0

      # 2) Claude Code Action を実行する。
      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          # 実行方針は同期配布される CLAUDE.md を参照させる。
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          custom_instructions: "Follow our coding standards(CLAUDE.md)."
          model: claude-opus-4-5
