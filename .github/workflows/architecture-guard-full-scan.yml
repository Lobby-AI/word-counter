name: Architecture Guard Full Scan

on:
  # 手動実行で即時チェック可能。
  workflow_dispatch:
  # 週次定期スキャン（月曜 UTC 01:00）。
  schedule:
    - cron: "0 1 * * 1"

permissions:
  # issue へレポートを更新するため write が必要。
  contents: read
  issues: write

concurrency:
  # full scan は同時多重起動を避ける。
  group: architecture-guard-full-scan
  cancel-in-progress: false

jobs:
  full-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Detect Next.js Project
        id: detect-next
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const repoRoot = process.cwd();
            const ignoreDirNames = new Set([
              '.git',
              'node_modules',
              '.next',
              'dist',
              'build',
              'coverage',
              '.turbo',
              '.vercel',
            ]);
            const toPosix = (p) => p.split(path.sep).join('/');

            const isDirectory = (absPath) => {
              try {
                return fs.existsSync(absPath) && fs.statSync(absPath).isDirectory();
              } catch {
                return false;
              }
            };

            const walkPackageJsonFiles = (startDir) => {
              const out = [];
              const stack = [startDir];
              while (stack.length > 0) {
                const dir = stack.pop();
                let entries;
                try {
                  entries = fs.readdirSync(dir, { withFileTypes: true });
                } catch {
                  continue;
                }

                for (const entry of entries) {
                  const abs = path.join(dir, entry.name);
                  if (entry.isDirectory()) {
                    if (ignoreDirNames.has(entry.name)) continue;
                    stack.push(abs);
                    continue;
                  }
                  if (entry.isFile() && entry.name === 'package.json') {
                    out.push(abs);
                  }
                }
              }
              return out;
            };

            const pickSourceAndAppRoots = (packageDir) => {
              const appDir = path.join(packageDir, 'app');
              if (isDirectory(appDir)) {
                return { sourceRoot: packageDir, appRoot: appDir };
              }

              const srcAppDir = path.join(packageDir, 'src', 'app');
              if (isDirectory(srcAppDir)) {
                return { sourceRoot: path.join(packageDir, 'src'), appRoot: srcAppDir };
              }
              return null;
            };

            const depthFromRoot = (absDir) => {
              const rel = path.relative(repoRoot, absDir);
              if (!rel) return 0;
              return toPosix(rel).split('/').length;
            };

            const candidates = walkPackageJsonFiles(repoRoot)
              .map((packageJsonPath) => {
                const packageDir = path.dirname(packageJsonPath);
                const roots = pickSourceAndAppRoots(packageDir);
                if (!roots) return null;
                return {
                  packageJsonPath,
                  packageDir,
                  sourceRoot: roots.sourceRoot,
                  appRoot: roots.appRoot,
                };
              })
              .filter(Boolean);

            // package.json + app/src/app を満たす対象が無い場合はスキップする。
            if (candidates.length === 0) {
              core.setOutput('is_nextjs', 'false');
              core.setOutput('package_dir', '');
              core.notice('Skip full scan: package.json + app/src/app を満たす対象が見つかりませんでした。');
              return;
            }

            // `.ci/architecture-guards.mjs` と同じ優先度で実行対象 package を1つ選ぶ。
            candidates.sort((a, b) => {
              const aIsRoot = a.packageDir === repoRoot ? 0 : 1;
              const bIsRoot = b.packageDir === repoRoot ? 0 : 1;
              if (aIsRoot !== bIsRoot) return aIsRoot - bIsRoot;

              const aIsWeb = path.basename(a.packageDir) === 'web' ? 0 : 1;
              const bIsWeb = path.basename(b.packageDir) === 'web' ? 0 : 1;
              if (aIsWeb !== bIsWeb) return aIsWeb - bIsWeb;

              const depthDiff = depthFromRoot(a.packageDir) - depthFromRoot(b.packageDir);
              if (depthDiff !== 0) return depthDiff;
              return a.packageDir.localeCompare(b.packageDir);
            });

            const picked = candidates[0];
            const packageDir = toPosix(path.relative(repoRoot, picked.packageDir) || '.');
            const packageJson = toPosix(path.relative(repoRoot, picked.packageJsonPath));
            const appRoot = toPosix(path.relative(repoRoot, picked.appRoot));

            core.setOutput('is_nextjs', 'true');
            core.setOutput('package_dir', packageDir);
            core.notice(`Full scan target: package=${packageJson}, app=${appRoot}`);

      - name: Install Dependencies For AST Parsing
        # 対象 package の lockfile があるときだけ依存を導入する（無ければ regex fallback）。
        if: steps.detect-next.outputs.is_nextjs == 'true'
        run: |
          set -euo pipefail
          PACKAGE_DIR="${{ steps.detect-next.outputs.package_dir }}"
          if [ -z "$PACKAGE_DIR" ]; then
            echo "Skip dependency installation: package_dir is empty."
            exit 0
          fi

          if [ -f "$PACKAGE_DIR/package-lock.json" ]; then
            npm ci --prefix "$PACKAGE_DIR" --ignore-scripts
          else
            echo "Skip dependency installation: package-lock.json was not found under $PACKAGE_DIR."
          fi

      - name: Run Architecture Guards Full Scan
        if: steps.detect-next.outputs.is_nextjs == 'true'
        id: scan
        continue-on-error: true
        run: |
          set +e
          # 標準出力は issue 掲載用にファイル化する。
          node .ci/architecture-guards.mjs --report-json architecture-guard-report.json > architecture-guard-output.txt 2>&1
          status=$?
          # 後続ステップが参照できるよう exit code を output 化。
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upsert Full Scan Issue
        # 実行結果を単一 issue に集約する（作成 or 更新）。
        if: steps.detect-next.outputs.is_nextjs == 'true'
        uses: actions/github-script@v7
        env:
          GUARD_EXIT_CODE: ${{ steps.scan.outputs.exit_code }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            // issue の再利用判定に使うメタマーカー。
            const marker = '<!-- architecture-guard-full-scan -->';
            const title = 'Architecture Guard Full Scan Report';
            const exitCode = process.env.GUARD_EXIT_CODE || '1';
            const passed = exitCode === '0';

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            let output = '';
            try {
              output = fs.readFileSync('architecture-guard-output.txt', 'utf8');
            } catch (e) {
              output = `Failed to read architecture-guard-output.txt: ${String(e)}`;
            }

            let report = null;
            try {
              report = JSON.parse(fs.readFileSync('architecture-guard-report.json', 'utf8'));
            } catch (e) {
              report = null;
            }

            // 長すぎるログで issue 本文が壊れないよう上限をかける。
            const maxLen = 60000;
            const truncatedOutput = output.length > maxLen
              ? `${output.slice(0, maxLen)}\n... (truncated)`
              : output;

            const mustCount = report?.summary?.mustActiveCount ?? 'n/a';
            const warnCount = report?.summary?.warnActiveCount ?? 'n/a';
            const suppressedCount = report?.summary?.suppressedCount ?? 'n/a';
            const parserMode = report?.astImportParsingEnabled === true
              ? 'AST (typescript)'
              : 'Regex fallback';

            // Guard ごとの件数サマリーを読みやすい箇条書きへ変換する。
            const guardSummary = Array.isArray(report?.guards)
              ? report.guards.map((guard) => {
                  const severity = guard.severity ?? 'unknown';
                  const key = guard.key ?? 'unknown';
                  const active = guard.activeCount ?? 'n/a';
                  const suppressed = guard.suppressedCount ?? 'n/a';
                  return `- [${severity}] ${key}: active=${active}, suppressed=${suppressed}`;
                }).join('\n')
              : '- (guard summary unavailable)';

            const severityRank = (severity) => {
              if (severity === 'must') return 0;
              if (severity === 'warn') return 1;
              return 2;
            };

            // レポート中のサンプル違反をフラット化して上位表示に使う。
            const sampledViolations = Array.isArray(report?.guards)
              ? report.guards.flatMap((guard) => {
                  const severity = guard.severity ?? 'unknown';
                  const guardKey = guard.key ?? 'unknown';
                  const samples = Array.isArray(guard.activeSamples) ? guard.activeSamples : [];
                  return samples.map((sample) => ({
                    severity,
                    guardKey,
                    id: sample?.id ?? '(unknown-id)',
                    file: typeof sample?.file === 'string' ? sample.file : null,
                    line: Number.isFinite(sample?.line) ? sample.line : 1,
                    detail: typeof sample?.detail === 'string' ? sample.detail : '',
                  }));
                })
              : [];

            sampledViolations.sort((a, b) => {
              const rankDiff = severityRank(a.severity) - severityRank(b.severity);
              if (rankDiff !== 0) return rankDiff;
              if (a.guardKey !== b.guardKey) return a.guardKey.localeCompare(b.guardKey);
              return a.id.localeCompare(b.id);
            });

            const topViolations = sampledViolations.slice(0, 15);
            const topViolationLines = topViolations.length === 0
              ? '- (違反なし)'
              : topViolations.map((item, index) => {
                  const filePath = item.file;
                  const line = item.line > 0 ? item.line : 1;
                  // file:line へ直接ジャンプできる blob URL を生成する。
                  const locationLabel = filePath ? `${filePath}:${line}` : '(location unavailable)';
                  const locationLink = filePath
                    ? `${context.serverUrl}/${owner}/${repo}/blob/${context.sha}/${encodeURI(filePath)}#L${line}`
                    : null;
                  const locationText = locationLink ? `[${locationLabel}](${locationLink})` : locationLabel;
                  const detailText = item.detail ? ` | ${item.detail}` : '';
                  return `${index + 1}. ${locationText} | [${item.severity}] ${item.guardKey} | \`${item.id}\`${detailText}`;
                }).join('\n');

            const remainingCount = Math.max(0, sampledViolations.length - topViolations.length);
            const topViolationNote = remainingCount > 0
              ? `- 他 ${remainingCount} 件はActionsログまたはJSONレポートを参照`
              : '- 追加の違反はありません';

            const statusLine = passed
              ? '✅ Full scan passed'
              : '❌ Full scan failed (must violations found)';

            const body = [
              marker,
              `## ${statusLine}`,
              '',
              `- 実行日時 (UTC): ${new Date().toISOString()}`,
              `- 実行URL: ${runUrl}`,
              `- import解析モード: ${parserMode}`,
              `- must violations: ${mustCount}`,
              `- warn violations: ${warnCount}`,
              `- suppressed: ${suppressedCount}`,
              '',
              '### Guard別サマリー',
              guardSummary,
              '',
              '### 上位15件（file:line）',
              'クリックで該当行に移動できます。',
              topViolationLines,
              topViolationNote,
              '',
              '<details>',
              '<summary>Raw Output</summary>',
              '',
              '```text',
              // 詳細解析向けに raw output も折りたたみで残す。
              truncatedOutput || '(no output)',
              '```',
              '</details>',
            ].join('\n');

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            // 既存 report issue があれば更新、無ければ新規作成。
            const existing = issues.find(
              (issue) => !issue.pull_request && issue.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
            }

      - name: Fail Workflow On Must Violations
        # must 違反がある場合は workflow 全体を失敗扱いにする。
        if: steps.detect-next.outputs.is_nextjs == 'true' && steps.scan.outputs.exit_code != '0'
        run: |
          echo "Architecture guard full scan detected must violations."
          cat architecture-guard-output.txt
          exit 1
